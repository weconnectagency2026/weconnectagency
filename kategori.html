<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/generel.css" />
    <link rel="stylesheet" href="css/kategori.css" />

    <title>WeConnect Agency | Category</title>
    <script src="./kategori.js" defer></script>
  </head>

  <body>
    <main class="kategori_page">
      <section class="kategori_top">
        <nav>
          <a href="index.html" class="logo_button">WeConnect</a>
          <a href="index.html" class="logo_button_del2">AGENCY</a>

          <a href="kategori.html" class="knap_nav1">FIND TALENT</a>
          <a href="kategori.html" class="knap_nav">OUR VISION</a>
          <a href="kategori.html" class="knap_nav">CONTACT</a>
        </nav>
      </section>

      <section class="kategori_indhold">
        <section class="filter_bar" aria-label="Filter creators">
          <button
            class="filter_trigger"
            id="toggleFilters"
            type="button"
            aria-expanded="false"
            aria-controls="filterOverlay"
          >
            FILTER
          </button>
        </section>

        <section class="creator_section" aria-label="Creators">
          <div class="creator_grid" id="creatorGrid"></div>
        </section>

        <section class="top_selectors" aria-label="Top selectors">
          <h2 id="footer_h2">OUR TOP CELECTORS</h2>
          <div class="top_selectors_grid" id="topSelectorsGrid"></div>
        </section>
      </section>

      <footer>
        <div class="footer_nav">
          <a href="kategori.html" id="knap_footer">CONTACT</a>
          <a href="kategori.html" id="knap_footer">INSTAGRAM</a>
          <a href="kategori.html" id="knap_footer">TIKTOK</a>
        </div>
      </footer>
    </main>

    <div class="filter_overlay" id="filterOverlay" aria-hidden="true">
      <aside
        class="filter_panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filterTitle"
      >
        <div class="filter_panel_header">
          <p id="filterTitle">FILTER</p>
          <button
            id="closeFilterBtn"
            type="button"
            class="close_btn"
            aria-label="Close filter"
          >
            CLOSE
          </button>
        </div>

        <form id="filterForm" class="filter_form">
          <section class="filter_group">
            <h3>Type</h3>
            <div class="checkbox_grid three_columns">
              <label
                ><input type="checkbox" name="type" value="Model" />
                Model</label
              >
              <label
                ><input type="checkbox" name="type" value="Actor" />
                Actor</label
              >
              <label
                ><input type="checkbox" name="type" value="Statist" />
                Statist</label
              >
              <label
                ><input type="checkbox" name="type" value="Creator" />
                Creator</label
              >
              <label
                ><input type="checkbox" name="type" value="Influencer" />
                Influencer</label
              >
              <label
                ><input type="checkbox" name="type" value="Extra" />
                Extra</label
              >
            </div>
          </section>

          <section class="filter_group">
            <h3>Gender</h3>
            <div class="checkbox_grid">
              <label
                ><input type="checkbox" name="gender" value="female" />
                Female</label
              >
              <label
                ><input type="checkbox" name="gender" value="male" />
                Male</label
              >
              <label
                ><input type="checkbox" name="gender" value="non-binary" />
                Non-binary</label
              >
            </div>
          </section>

          <section class="filter_group">
            <h3>Age</h3>
            <div class="range_wrap">
              <div class="range_value"><span id="ageValue">60</span></div>
              <input type="range" id="ageRange" min="18" max="60" value="60" />
            </div>
          </section>

          <section class="filter_group">
            <h3>Appearance</h3>

            <div class="appearance_block">
              <label class="sub_label" for="heightRange">Height</label>
              <div class="range_labels">
                <span>150 cm</span>
                <span id="heightValue">210 cm</span>
              </div>
              <input
                type="range"
                id="heightRange"
                min="150"
                max="210"
                value="210"
              />
            </div>

            <div class="select_grid">
              <select id="hairColorSelect" aria-label="Hair Color">
                <option value="">Hair Color</option>
              </select>

              <select id="eyeColorSelect" aria-label="Eye Color">
                <option value="">Eye Color</option>
              </select>

              <select id="hairTypeSelect" aria-label="Hair Type">
                <option value="">Hair Type</option>
              </select>

              <select id="weightSelect" aria-label="Weight">
                <option value="">Weight</option>
                <option value="50">Up to 50 kg</option>
                <option value="60">Up to 60 kg</option>
                <option value="70">Up to 70 kg</option>
                <option value="80">Up to 80 kg</option>
                <option value="90">Up to 90 kg</option>
                <option value="100">Up to 100 kg</option>
              </select>
            </div>
          </section>

          <section class="filter_group">
            <h3>Location</h3>
            <div class="location_field">
              <input
                type="text"
                id="locationInput"
                placeholder="Copenhagen"
                autocomplete="off"
              />
            </div>
          </section>

          <div class="filter_actions">
            <button type="button" id="clearFiltersBtn" class="link_btn">
              Clear All
            </button>
            <button type="submit" class="results_btn">Show Results</button>
          </div>
        </form>
      </aside>
    </div>
  </body>
</html>
